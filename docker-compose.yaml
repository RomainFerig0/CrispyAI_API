services:
  mongo:
    image: mongo:latest
    container_name: mongo
    networks:
      - backend

  api:
    build: ./api
    container_name: fastapi
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017
    ports:
      - "8080:8080"
    networks:
      - backend
    env_file: ".env"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command:
      - "http"
      - "api:8080"
    environment:
      - NGROK_AUTHTOKEN=2yMnMD4FPrR8Als5PaCi2CTgpPZ_619vX4kfXjB12wsHH6NBF
    ports:
      - "4040:4040"
    depends_on:
      - api
    networks:
      - backend

networks:
  backend: